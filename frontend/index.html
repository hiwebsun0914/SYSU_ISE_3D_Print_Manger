<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Meta Tags -->
    <meta name="description" content="Monitor and manage your Bambu Lab 3D printers" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%img/SYSU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%img/SYSU.png" />

    <link rel="apple-touch-startup-image" href="%BASE_URL%img/SYSU.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration (skip on SpoolBuddy kiosk) -->
    <script>
      const FRONTEND_BUILD_ID = '2026-04-18-queue-search-v1';
      const FRONTEND_BUILD_KEY = 'bambuddy-frontend-build-id';

      async function resetFrontendCaches() {
        const registrations = await navigator.serviceWorker.getRegistrations();
        const unregisterJobs = registrations.map((registration) => registration.unregister());
        const cacheNames = await caches.keys();
        const deleteJobs = cacheNames
          .filter((name) => name.startsWith('bambuddy-'))
          .map((name) => caches.delete(name));

        await Promise.all([...unregisterJobs, ...deleteJobs]);
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          if (location.pathname.startsWith('/spoolbuddy')) {
            const regs = await navigator.serviceWorker.getRegistrations();
            if (regs.length > 0) {
              await resetFrontendCaches();
              location.reload();
            }
            return;
          }

          const currentBuildId = localStorage.getItem(FRONTEND_BUILD_KEY);
          if (currentBuildId !== FRONTEND_BUILD_ID) {
            await resetFrontendCaches();
            localStorage.setItem(FRONTEND_BUILD_KEY, FRONTEND_BUILD_ID);
            location.reload();
            return;
          }

          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
