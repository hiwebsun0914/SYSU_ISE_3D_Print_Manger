services:
  bambuddy:
    image: ghcr.io/maziggy/bambuddy:latest
    build: .
    # Usage:
    #   docker compose up -d          → pulls pre-built image from ghcr.io
    #   docker compose up -d --build  → builds locally from source
    container_name: bambuddy
    # Run as current user to avoid permission issues with mounted volumes
    # Override with: PUID=$(id -u) PGID=$(id -g) docker compose up -d
    user: "${PUID:-1000}:${PGID:-1000}"
    #
    # Proxy mode: allow binding to privileged ports (322, 990) as non-root user.
    # Without this, the FTP and RTSP proxies silently fail.
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - seccomp=unconfined
    #
    # LINUX: Use host mode for printer discovery and camera streaming
    network_mode: host
    #
    # macOS/WINDOWS: Docker Desktop doesn't support host mode.
    # Comment out "network_mode: host" above and uncomment "ports:" below.
    # Note: Printer discovery won't work - add printers manually by IP.
    #ports:
    #  - "${PORT:-8000}:8000"
    #  - "3000:3000"                  # Virtual printer bind/detect
    #  - "3002:3002"                  # Virtual printer bind/detect
    #  - "8883:8883"                  # Virtual printer MQTT
    #  - "990:990"                    # Virtual printer FTP control
    #  - "6000:6000"                  # Virtual printer file transfer tunnel
    #  - "322:322"                    # Virtual printer RTSP camera (X1/H2/P2)
    #  - "2024-2026:2024-2026"        # Virtual printer proprietary ports (A1/P1S)
    #  - "50000-50100:50000-50100"    # Virtual printer FTP passive data
    volumes:
      - bambuddy_data:/app/data
      - bambuddy_logs:/app/logs
      - bambuddy_online_slicer:/app/data/online_slicer
      #
      # Share virtual printer certs with native installation
      # This ensures the slicer only needs to trust one CA certificate.
      - ./virtual_printer:/app/data/virtual_printer
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Port BamBuddy runs on (default: 8000)
      # Usage: PORT=8080 docker compose up -d
      - PORT=${PORT:-8000}
      - PUBLIC_FILE_BASE_URL=${PUBLIC_FILE_BASE_URL:-}
      - PUBLIC_FILE_UPLOAD_BASE_URL=${PUBLIC_FILE_UPLOAD_BASE_URL:-}
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
      - MAKERWORLD_TITLE_AI_MODEL=${MAKERWORLD_TITLE_AI_MODEL:-glm-4-plus}
      - PUBLIC_LIVE_CAMERA_UPLOAD_INTERVAL_SECONDS=${PUBLIC_LIVE_CAMERA_UPLOAD_INTERVAL_SECONDS:-0.5}
      - PUBLIC_LIVE_CAMERA_ROTATION_SECONDS=${PUBLIC_LIVE_CAMERA_ROTATION_SECONDS:-10}
      - PUBLIC_LIVE_CAMERA_IDLE_TIMEOUT_SECONDS=${PUBLIC_LIVE_CAMERA_IDLE_TIMEOUT_SECONDS:-10}
      - QUEUE_ADMIN_ACTION_PASSWORD=${QUEUE_ADMIN_ACTION_PASSWORD:-sysuzgxytj}
      # Browser URL for the remote BambuStudio session (optional).
      # Example: http://192.168.1.100:6080/vnc.html?autoconnect=1&resize=remote
      - ONLINE_SLICER_BASE_URL=${ONLINE_SLICER_BASE_URL:-}
      # Browser URL for Kiri:Moto (optional, defaults to https://grid.space/kiri/).
      - ONLINE_KIRI_MOTO_URL=${ONLINE_KIRI_MOTO_URL:-}
      # Virtual printer: Set to the Docker host's IP when using bridge mode (ports:).
      # Required for FTP passive mode to work behind NAT.
      # Example: VIRTUAL_PRINTER_PASV_ADDRESS=192.168.1.100
      #- VIRTUAL_PRINTER_PASV_ADDRESS=
    restart: unless-stopped

  bambu_studio_web:
    profiles:
      - online-slicer
      - bambu-slicer
    build:
      context: .
      dockerfile: deploy/online_slicer/Dockerfile
      args:
        SLICER_APPIMAGE_URL: https://github.com/bambulab/BambuStudio/releases/download/v02.05.00.67/Bambu_Studio_linux_fedora-v02.05.00.66.AppImage
        SLICER_BIN_NAME: BambuStudio
        SLICER_APP_DIR: BambuStudio
    container_name: bambu-studio-web
    security_opt:
      - seccomp=unconfined
    environment:
      - ONLINE_SLICER_WORKSPACE=/workspace/bambuddy/bambu_studio
      - ONLINE_SLICER_BIN=/usr/local/bin/BambuStudio
      - ONLINE_SLICER_NAME=BambuStudio
    volumes:
      - bambuddy_online_slicer:/workspace/bambuddy
    ports:
      - "6080:6080"
    restart: unless-stopped
volumes:
  bambuddy_data:
  bambuddy_logs:
  bambuddy_online_slicer:
